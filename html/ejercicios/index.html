<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rutinas César</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --accent:   #f97316;
      --accent2:  #fb923c;
      --text:     #e5e5e5;
      --muted:    #737373;
      --labrum:   #22c55e;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo { font-size: 28px; }
    .header-info { flex: 1; }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .day-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent2);
      white-space: nowrap;
    }
    .day-badge .emoji { font-size: 18px; }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 120px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Stats bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      text-align: center;
    }
    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Input card ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-card label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 12px 14px;
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn-generate {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-generate:hover:not(:disabled) { background: var(--accent2); }
    .btn-generate:active:not(:disabled) { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Output card ── */
    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }
    .output-header {
      background: rgba(249,115,22,0.08);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .output-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1s ease-in-out infinite;
    }
    .output-dot.done { animation: none; background: var(--labrum); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .output-body {
      padding: 24px;
      font-size: 15px;
      line-height: 1.7;
    }

    /* Markdown styles */
    .output-body h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin: 24px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .output-body h2:first-child { margin-top: 0; }
    .output-body h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent2);
      margin: 16px 0 6px;
    }
    .output-body h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin: 12px 0 4px;
    }
    .output-body p { margin: 6px 0; }
    .output-body ul, .output-body ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .output-body li { margin: 4px 0; }
    .output-body strong { color: #fff; font-weight: 700; }
    .output-body em { color: var(--muted); font-style: italic; }
    .output-body code {
      background: rgba(249,115,22,0.1);
      color: var(--accent2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .output-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .output-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--muted);
      margin: 8px 0;
    }

    /* ── Labrum banner (fixed bottom) ── */
    .labrum-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22,22,22,0.95);
      border-top: 1px solid rgba(34,197,94,0.3);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .labrum-icon {
      font-size: 18px;
      flex-shrink: 0;
    }
    .labrum-text {
      flex: 1;
      color: var(--labrum);
      font-weight: 600;
    }
    .labrum-detail {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Error ── */
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 14px 18px;
      color: #fca5a5;
      font-size: 14px;
      display: none;
    }

    @media (max-width: 480px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      header { gap: 10px; }
      .day-badge { font-size: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">💪</div>
  <div class="header-info">
    <div class="header-title">Rutinas César</div>
    <div class="header-sub" id="dateDisplay">Cargando...</div>
  </div>
  <div class="day-badge">
    <span class="emoji" id="dayEmoji">⏳</span>
    <span id="dayLabel">Cargando</span>
  </div>
</header>

<main>

  <div class="stats">
    <div class="stat">
      <div class="stat-val">75.9 kg</div>
      <div class="stat-label">Peso actual</div>
    </div>
    <div class="stat">
      <div class="stat-val">72 kg</div>
      <div class="stat-label">Objetivo</div>
    </div>
    <div class="stat">
      <div class="stat-val">20.7%</div>
      <div class="stat-label">Grasa corporal</div>
    </div>
    <div class="stat">
      <div class="stat-val">−3.15 kg</div>
      <div class="stat-label">Progreso</div>
    </div>
  </div>

  <div class="input-card">
    <label>¿Cómo te encuentras hoy?</label>
    <textarea
      id="userInput"
      placeholder="Opcional: cuéntame algo sobre hoy... cansancio, tiempo disponible, dolor, estado de ánimo..."
    ></textarea>
    <button class="btn-generate" id="btnGenerate" onclick="generateRoutine()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Generar mi rutina de hoy</span>
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="output-card" id="outputCard">
    <div class="output-header">
      <div class="output-dot" id="outputDot"></div>
      <span id="outputHeaderText">Generando rutina...</span>
    </div>
    <div class="output-body" id="outputBody"></div>
  </div>

</main>

<div class="labrum-banner">
  <div class="labrum-icon">⚕️</div>
  <div class="labrum-text">
    Rutina Labrum siempre incluida
    <span class="labrum-detail"> · Rot. externa · Rot. interna · Abducción horizontal · Row en W</span>
  </div>
</div>

<script>
  const PERIODIZACION = {
    0: { emoji: '🦵', label: 'Lunes — Piernas + Core' },
    1: { emoji: '🏃', label: 'Martes — Running' },
    2: { emoji: '💪', label: 'Miércoles — Tren Superior' },
    3: { emoji: '🚶', label: 'Jueves — Descanso Activo' },
    4: { emoji: '🔥', label: 'Viernes — Cuerpo Completo' },
    5: { emoji: '🏃', label: 'Sábado — Running Largo' },
    6: { emoji: '😴', label: 'Domingo — Descanso' },
  };

  function initHeader() {
    const now = new Date();
    const day = now.getDay() === 0 ? 6 : now.getDay() - 1; // Mon=0
    const info = PERIODIZACION[day];
    document.getElementById('dayEmoji').textContent = info.emoji;
    document.getElementById('dayLabel').textContent = info.label;
    const dateStr = now.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('dateDisplay').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
  }

  initHeader();

  let accumulatedText = '';

  async function generateRoutine() {
    const btn = document.getElementById('btnGenerate');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const outputCard = document.getElementById('outputCard');
    const outputBody = document.getElementById('outputBody');
    const outputDot = document.getElementById('outputDot');
    const outputHeaderText = document.getElementById('outputHeaderText');
    const errorMsg = document.getElementById('errorMsg');
    const userInput = document.getElementById('userInput').value.trim();

    // Reset
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Generando...';
    errorMsg.style.display = 'none';
    outputCard.style.display = 'block';
    outputBody.innerHTML = '';
    outputDot.className = 'output-dot';
    outputHeaderText.textContent = 'Generando rutina...';
    accumulatedText = '';

    try {
      const res = await fetch('/api/routine', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_input: userInput }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') {
            outputDot.className = 'output-dot done';
            outputHeaderText.textContent = 'Rutina lista ✓';
            break;
          }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.text) {
              accumulatedText += parsed.text;
              outputBody.innerHTML = marked.parse(accumulatedText);
              outputBody.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
          } catch (e) {
            if (e.message && !e.message.includes('JSON')) throw e;
          }
        }
      }
    } catch (err) {
      errorMsg.textContent = `Error al generar la rutina: ${err.message}. Comprueba que el servidor esté activo.`;
      errorMsg.style.display = 'block';
      outputCard.style.display = 'none';
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Generar mi rutina de hoy';
    }
  }

  // Enter en textarea no envía (es multiline), Ctrl+Enter sí
  document.getElementById('userInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateRoutine();
  });
</script>
</body>
</html>
