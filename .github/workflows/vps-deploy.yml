name: VPS Deploy Tools

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'html/**'
      - 'nginx.conf'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 135.125.102.63
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/tools
            git pull origin main
            sudo docker compose restart
            sleep 2
            curl -sf http://localhost:4001 > /dev/null && echo "OK - tools-library up" || echo "WARN - container not responding"
